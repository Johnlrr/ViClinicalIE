<!DOCTYPE html><html><head><meta charset=UTF-8><title>NER-5 Verify</title><style>*{margin:0;padding:0}body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}.container{max-width:900px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center}.content{padding:30px}.sample-counter{display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #eee}.sample-box{background:#f8f9fa;border:2px solid #e9ecef;border-radius:8px;padding:20px;margin:15px 0;line-height:1.8}.entity-span{padding:2px 6px;border-radius:4px;font-weight:500;margin:0 2px}.entity-list{margin-top:15px;padding:15px;border-left:4px solid #667eea}.entity-badge{display:inline-block;padding:3px 8px;border-radius:12px;color:white;font-size:11px;margin-right:8px}.notes-box{margin:15px 0}.notes-box label{display:block;font-weight:bold;margin-bottom:5px}.notes-box textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;min-height:60px}.status-box{background:#d4edda;border:1px solid #c3e6cb;color:#155724;padding:10px;border-radius:6px;margin:10px 0;display:none}.status-box.show{display:block}.controls{display:flex;gap:10px;margin:20px 0}.controls button{flex:1;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}.btn-prev,.btn-next{background:#6c757d;color:white}.btn-approve{background:#28a745;color:white}.btn-reject{background:#dc3545;color:white}.btn-export{background:#007bff;color:white}.checklist{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px;margin:10px 0}.checklist h3{color:#856404;font-size:13px;margin-bottom:8px}.checklist-item{margin:5px 0;font-size:12px}</style></head><body><div class=container><div class=header><h1>NER-5 Data Verification</h1></div><div class=content><div class=sample-counter><span id=sampleId></span><span id=progress></span></div><div class=checklist><h3>Checklist:</h3><div class=checklist-item>Boundary dung?</div><div class=checklist-item>Type dung?</div><div class=checklist-item>Text tu nhien?</div></div><div class=sample-box id=sampleText></div><div class=entity-list id=entityList></div><div class=status-box id=statusBox></div><div class=notes-box><label>Ghi chu:</label><textarea id=notesInput></textarea></div><div class=controls><button class=btn-prev id=prevBtn>Prev</button><button class=btn-next id=nextBtn>Next</button><button class=btn-approve id=approveBtn>Approve</button><button class=btn-reject id=rejectBtn>Reject</button><button class=btn-export id=exportBtn>Export</button></div></div></div><script>var idx=0,samples=[],reviews={},notes={},colors={TRIEU_CHUNG:"#FF8C00",CHAN_DOAN:"#0066CC",THUOC:"#9933FF",TEN_XET_NGHIEM:"#00AA33",KET_QUA_XET_NGHIEM:"#CC0000"};async function load(){samples=await(await fetch("/api/samples")).json();document.getElementById("progress").textContent="0/"+samples.length;render()}function render(){if(!samples.length)return;var s=samples[idx],fid=s.file_id;document.getElementById("sampleId").textContent=fid;document.getElementById("progress").textContent=(idx+1)+"/"+samples.length;document.getElementById("notesInput").value=notes[fid]||"";var html="",ents=(s.entities||[]).sort((a,b)=>a.start-b.start);if(ents.length===0){html="<p style=color:#999>No entities</p><p>"+s.text+"</p>"}else{var last=0;for(var e of ents){html+=s.text.substring(last,e.start);var c=colors[e.type]||"#CCC";html+="<span class=entity-span style=background:"+c+";color:white>"+e.text+"</span>";last=e.end}html+=s.text.substring(last)}document.getElementById("sampleText").innerHTML=html;var list="<strong>Entities:</strong>";if(ents.length===0)list+="<p style=color:#999>None</p>";else for(var e2 of ents)list+="<div><span class=entity-badge style=background:"+(colors[e2.type]||"#CCC")+">"+e2.type+"</span>"+e2.text+"</div>";document.getElementById("entityList").innerHTML=list;var st=reviews[fid],box=document.getElementById("statusBox");if(st){box.innerHTML="<strong>Status:</strong> "+(st==="approved"?"APPROVED":"REJECTED");box.classList.add("show")}else box.classList.remove("show")}function save(r){reviews[samples[idx].file_id]=r;notes[samples[idx].file_id]=document.getElementById("notesInput").value;render();if(idx<samples.length-1){idx++;render()}}function exp(){var d={timestamp:new Date().toISOString(),reviews:reviews,notes:notes};var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ner5_review.json";a.click()}document.getElementById("prevBtn").onclick=()=>{if(idx>0){idx--;render()}};document.getElementById("nextBtn").onclick=()=>{if(idx<samples.length-1){idx++;render()}};document.getElementById("approveBtn").onclick=()=>save("approved");document.getElementById("rejectBtn").onclick=()=>save("rejected");document.getElementById("exportBtn").onclick=exp;load()</script></body></html>
